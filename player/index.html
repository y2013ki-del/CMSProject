<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CMS Player</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:1920px; height:1080px;
  background:#000;
  overflow:hidden;
  font-family:'Malgun Gothic', sans-serif;
}

/* ── 콘텐츠 레이어 ── */
#player {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  background:#000;
}
#imgLayer {
  display:none;
  width:1920px; height:1080px;
  object-fit:contain;
}
#videoLayer {
  display:none;
  width:1920px; height:1080px;
  object-fit:contain;
  background:#000;
}
#cctvLayer {
  display:none;
  width:1920px; height:1080px;
  object-fit:fill;
}

/* ── 오버레이 레이어 ── */
#overlay {
  position:absolute; inset:0;
  pointer-events:none;
  z-index:100;
}
#overlay img {
  width:100%; height:100%;
  display:block;
}

/* ── 상태 표시 (디버그용, 프로덕션에서는 숨김) ── */
#statusBar {
  position:absolute; bottom:0; left:0; right:0;
  padding:6px 14px;
  background:rgba(0,0,0,.7);
  color:#ccc;
  font-size:13px;
  z-index:200;
  display:none; /* 프로덕션: none, 개발: flex */
  align-items:center;
  gap:12px;
}
#statusBar.dev { display:flex; }
.status-dot {
  width:8px; height:8px;
  border-radius:50%;
  background:#e05353;
  flex-shrink:0;
}
.status-dot.connected { background:#4caf7d; }

/* ── 채널 미선택 안내 ── */
#noChannel {
  color:#555; font-size:22px; text-align:center;
  display:none; flex-direction:column; align-items:center; gap:14px;
}
#noChannel.show { display:flex; }
</style>
</head>
<body>

<div id="player">
  <img   id="imgLayer"   src="" alt=""/>
  <video id="videoLayer" src="" playsinline muted="false" preload="auto"></video>
  <img   id="cctvLayer"  src="" alt=""/>
  <div   id="noChannel"  class="show">
    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
    </svg>
    <div>채널 ID를 URL 파라미터로 지정하세요</div>
    <div style="font-size:15px;color:#444;">예: /player?channel=ch_xxxxxxxx</div>
  </div>
</div>

<div id="overlay">
  <img src="/overlay.png" onerror="this.style.display='none'" alt=""/>
</div>

<div id="statusBar">
  <div class="status-dot" id="wsDot"></div>
  <span id="wsStatus">연결 중...</span>
  <span>|</span>
  <span id="chInfo">채널 없음</span>
  <span>|</span>
  <span id="itemInfo">—</span>
</div>

<script>
// ════════════════════════════════════════════════
//  설정
// ════════════════════════════════════════════════
var DEBUG = false; // true로 변경 시 하단 상태 바 표시

var WS_RETRY_INTERVAL = 5000;   // WebSocket 재연결 간격 (ms)
var ITEM_PRELOAD_MS   = 500;    // 다음 항목 전환 전 여유 시간 (ms)
var DEFAULT_DURATION  = 10;     // 이미지 기본 표시 시간 (초)
var MAX_VIDEO_WAIT_MS = 30000;  // 동영상 로드 타임아웃 (ms)

// ════════════════════════════════════════════════
//  상태
// ════════════════════════════════════════════════
var channelId   = null;
var playlist    = [];
var currentIdx  = 0;
var playTimer   = null;
var ws          = null;
var isTizen     = typeof webapis !== 'undefined';
var serverBase  = location.protocol + '//' + location.host;

// ════════════════════════════════════════════════
//  DOM 참조
// ════════════════════════════════════════════════
var imgLayer   = document.getElementById('imgLayer');
var videoLayer = document.getElementById('videoLayer');
var cctvLayer  = document.getElementById('cctvLayer');
var noChannel  = document.getElementById('noChannel');
var statusBar  = document.getElementById('statusBar');
var wsDot      = document.getElementById('wsDot');
var wsStatus   = document.getElementById('wsStatus');
var chInfo     = document.getElementById('chInfo');
var itemInfo   = document.getElementById('itemInfo');

// ════════════════════════════════════════════════
//  초기화
// ════════════════════════════════════════════════
function init() {
  if (DEBUG) statusBar.classList.add('dev');

  var params = new URLSearchParams(location.search);
  channelId  = params.get('channel');

  if (!channelId) { noChannel.classList.add('show'); return; }

  noChannel.classList.remove('show');
  connectWS();
  fetchSchedule();
}

// ════════════════════════════════════════════════
//  스케줄 로드 (HTTP 폴백)
// ════════════════════════════════════════════════
function fetchSchedule() {
  var url = serverBase + '/api/schedule/current?channel=' + encodeURIComponent(channelId);
  fetch(url)
    .then(function(r) { return r.ok ? r.json() : null; })
    .then(function(d) {
      if (d && d.channel && d.channel.items) {
        applyPlaylist(d.channel.name, d.channel.items);
      }
    })
    .catch(function() {});
}

// ════════════════════════════════════════════════
//  WebSocket
// ════════════════════════════════════════════════
function connectWS() {
  var wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  var wsUrl   = wsProto + '//' + location.host + '/ws/player?channel=' + encodeURIComponent(channelId);

  ws = new WebSocket(wsUrl);

  ws.onopen = function() {
    setWsStatus(true);
    // keepalive ping
    clearInterval(ws._pingTimer);
    ws._pingTimer = setInterval(function() {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'ping' }));
    }, 30000);
  };

  ws.onmessage = function(e) {
    try {
      var msg = JSON.parse(e.data);
      if (msg.type === 'update' && msg.channel === channelId) {
        applyPlaylist(msg.name, msg.items || []);
      }
    } catch {}
  };

  ws.onclose = function() {
    setWsStatus(false);
    clearInterval(ws._pingTimer);
    // 자동 재연결
    setTimeout(connectWS, WS_RETRY_INTERVAL);
  };

  ws.onerror = function() { ws.close(); };
}

function setWsStatus(connected) {
  wsDot.classList.toggle('connected', connected);
  wsStatus.textContent = connected ? 'WebSocket 연결됨' : '재연결 대기 중...';
}

// ════════════════════════════════════════════════
//  플레이리스트 적용
// ════════════════════════════════════════════════
function applyPlaylist(name, items) {
  chInfo.textContent = '채널: ' + (name || channelId);
  if (!items || !items.length) {
    playlist = []; stopPlayback();
    return;
  }
  // 현재 재생 중인 항목의 인덱스 유지
  var curId = playlist[currentIdx] ? playlist[currentIdx].id : null;
  playlist  = items;
  var newIdx = playlist.findIndex(function(i) { return i.id === curId; });
  currentIdx = newIdx >= 0 ? newIdx : 0;
  // 현재 항목이 변경됐으면 즉시 전환
  if (newIdx < 0) playItem(currentIdx);
}

// ════════════════════════════════════════════════
//  재생 제어
// ════════════════════════════════════════════════
function stopPlayback() {
  clearTimeout(playTimer);
  hideAll();
}

function playItem(idx) {
  clearTimeout(playTimer);
  if (!playlist.length) { stopPlayback(); return; }
  currentIdx = (idx + playlist.length) % playlist.length;
  var item   = playlist[currentIdx];

  itemInfo.textContent = (currentIdx + 1) + '/' + playlist.length + ' · ' + (item.filename || item.cameraName || '');

  if (item.type === 'image')  playImage(item);
  else if (item.type === 'video') playVideo(item);
  else if (item.type === 'cctv')  playCctv(item);
  else nextItem(); // 알 수 없는 타입 → 스킵
}

function nextItem() {
  playItem(currentIdx + 1);
}

// ════════════════════════════════════════════════
//  이미지 재생
// ════════════════════════════════════════════════
function playImage(item) {
  showOnly('img');
  var duration = (item.duration || DEFAULT_DURATION) * 1000;
  imgLayer.onerror = function() { nextItem(); };
  imgLayer.onload  = function() {};
  imgLayer.src     = serverBase + '/media/' + encodeURIComponent(item.filename);
  playTimer = setTimeout(nextItem, duration);
}

// ════════════════════════════════════════════════
//  동영상 재생 (HTML5 · Tizen AVPlay 자동 분기)
// ════════════════════════════════════════════════
function playVideo(item) {
  var url      = serverBase + '/media/' + encodeURIComponent(item.filename);
  var duration = item.duration ? item.duration * 1000 : null;

  if (isTizen && webapis.avplay) {
    playVideoTizen(url, duration);
  } else {
    playVideoHtml5(url, duration);
  }
}

function playVideoHtml5(url, duration) {
  showOnly('video');
  videoLayer.pause();
  videoLayer.src     = url;
  videoLayer.currentTime = 0;

  var timeoutId = setTimeout(function() {
    videoLayer.pause(); nextItem();
  }, MAX_VIDEO_WAIT_MS);

  videoLayer.onended = function() { clearTimeout(timeoutId); if (duration) return; nextItem(); };
  videoLayer.onerror = function() { clearTimeout(timeoutId); nextItem(); };

  videoLayer.play().catch(function() { clearTimeout(timeoutId); nextItem(); });

  if (duration) {
    playTimer = setTimeout(function() { clearTimeout(timeoutId); videoLayer.pause(); nextItem(); }, duration);
  }
}

function playVideoTizen(url, duration) {
  showOnly('video');
  try {
    webapis.avplay.stop();
    webapis.avplay.open(url);
    webapis.avplay.setDisplayRect(0, 0, 1920, 1080);
    webapis.avplay.setListener({
      oncurrentplaytime: function() {},
      onbufferingstart:  function() {},
      onbufferingprogress: function() {},
      onbufferingcomplete: function() {},
      onstreamcompleted: function() { if (!duration) nextItem(); },
      onerror: function() { nextItem(); }
    });
    webapis.avplay.prepareAsync(
      function() {
        webapis.avplay.play();
        if (duration) playTimer = setTimeout(function() { try { webapis.avplay.stop(); } catch {} nextItem(); }, duration);
      },
      function() { nextItem(); }
    );
  } catch(e) { nextItem(); }
}

// ════════════════════════════════════════════════
//  CCTV 스트림 재생
// ════════════════════════════════════════════════
function playCctv(item) {
  showOnly('cctv');
  var duration = (item.duration || 30) * 1000;
  cctvLayer.onerror = function() { nextItem(); };
  cctvLayer.src = serverBase + '/stream/' + encodeURIComponent(item.cameraName);
  playTimer = setTimeout(nextItem, duration);
}

// ════════════════════════════════════════════════
//  레이어 전환
// ════════════════════════════════════════════════
function hideAll() {
  imgLayer.style.display   = 'none'; imgLayer.src = '';
  videoLayer.style.display = 'none'; videoLayer.pause(); videoLayer.src = '';
  cctvLayer.style.display  = 'none'; cctvLayer.src = '';
  if (isTizen && webapis.avplay) { try { webapis.avplay.stop(); } catch {} }
}

function showOnly(type) {
  hideAll();
  if (type === 'img')   imgLayer.style.display   = 'block';
  if (type === 'video') videoLayer.style.display  = 'block';
  if (type === 'cctv')  cctvLayer.style.display   = 'block';
}

// ════════════════════════════════════════════════
//  Tizen 전용 — 키 이벤트 (리모컨 대응)
// ════════════════════════════════════════════════
if (isTizen) {
  try { tizen.tvinputdevice.registerKey('MediaPlayPause'); } catch {}
  document.addEventListener('keydown', function(e) {
    switch (e.keyCode) {
      case 415: // Play
      case 19:  // Pause/Toggle — 운영 중에는 무시
        break;
      case 10009: // Return/Back — 뒤로 가기 방지
        e.preventDefault(); break;
    }
  });

  // Tizen 앱 가시성 변경 처리
  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      fetchSchedule(); // 화면 복귀 시 스케줄 갱신
    }
  });
}

// ════════════════════════════════════════════════
//  시작
// ════════════════════════════════════════════════
window.onload = init;
</script>
</body>
</html>
