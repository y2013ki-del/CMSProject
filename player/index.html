<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CMS Shell</title>
    <style>
        body { background: #000; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="status">Connecting to CMS Server...</div>
    <script>
        // 현재 접속한 서버 주소를 그대로 사용
        const SERVER_URL = window.location.origin + "/client";
        
        // 기기 고유 ID 추출 (Tizen ID 활용)
        let deviceId = "unknown";
        try {
            if (window.tizen && tizen.systeminfo) {
                deviceId = tizen.systeminfo.getCapability("http://tizen.org/system/tizenid");
            }
        } catch (e) { console.error("Tizen ID error", e); }

        // 서버로 즉시 이동
        // 쿼리 스트링으로 기기 ID를 넘겨 서버에서 어떤 TV인지 식별 가능하게 함
        window.location.replace(SERVER_URL + "?duid=" + encodeURIComponent(deviceId));
    </script>
</body>
</html>
